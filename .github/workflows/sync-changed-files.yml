name: 同步上游仓库 # 监听上游仓库文件变动

on:
  # 你可以手动触发
  workflow_dispatch:

  # 也可以定时同步（每6小时）
  schedule:
    - cron: '0 0 * * *'

jobs: # 创建环境
  sync-changed-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送代码

    steps:
      - name: 检出自己的仓库（存储状态和结果）
        uses: actions/checkout@v4
        with:
          repository: cfv2ray/subCollection
          token: ${{ secrets.HEXO_AUTO_DEPLOY }}
          path: own_repo
		  
      # 步骤1：检出上游仓库（默认会检出默认分支的最新提交）
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: free-nodes/v2rayfree   # 目标仓库
          path: upstream                    # 检出的目录名
          fetch-depth: 0                    # 获取完整历史，以便后续比较

      # 步骤2：获取最新一次提交的新增文件（对比 HEAD~1 和 HEAD）
      - name:  获取最新一次提交的新增文件（对比 HEAD~1 和 HEAD）
        id: current
        run: |
          cd upstream
          git diff --name-only --diff-filter=A HEAD~1 HEAD > newadd.txt
          cat newadd.txt
          cp newadd.txt ../own_repo/newadd.txt #  将列表保存到 own_repo 中，作为 newadd.txt
		  
     

      - name: 提交并推送到自己的仓库
        run: |
          cd own_repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "https://github.com/free-nodes/v2rayfree $(date)" || echo "No changes to commit"
          git push













          
