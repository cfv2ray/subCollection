name: 同步上游仓库 # 监听上游仓库文件变动

on:
  # 你可以手动触发
  workflow_dispatch:

  # 也可以定时同步（每6小时）
  schedule:
    - cron: '0 0 * * *'

jobs: # 创建环境
  sync-changed-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送代码

    steps:
      # 步骤1：检出上游仓库（默认会检出默认分支的最新提交）
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: jinwei26/testAction   # 目标仓库
          path: upstream                    # 检出的目录名
          fetch-depth: 0                    # 获取完整历史，以便后续比较

      # 步骤2：获取最新一次提交的新增文件（对比 HEAD~1 和 HEAD）
      - name: Get current commit SHA
        id: current
        run: |
          cd upstream
          git diff --name-only --diff-filter=A HEAD~1 HEAD > newadd.txt
          cat newadd.txt
